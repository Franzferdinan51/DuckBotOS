name: Build DuckBotOS ISO

on:
  push:
    branches:
      - main
      - duckbotos
    paths:
      - 'cx-distro/**'
      - 'packages/**'
      - 'scripts/**'
      - '.github/workflows/build-iso.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode'
        required: false
        default: 'hermes'
        type: choice
        options:
          - hermes
          - openclaw
          - both

env:
  DUCKBOTOS_MODE: ${{ inputs.mode || 'hermes' }}
  VERSION: '0.1.0'

jobs:
  build-iso:
    name: Build DuckBotOS (${{ env.DUCKBOTOS_MODE }}) ISO
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout DuckBotOS (this repo)
        uses: actions/checkout@v4
        with:
          path: duckbot-os-repo

      - name: Clone cx-distro build pipeline
        run: |
          if [ -d "duckbot-os-repo/cx-distro" ]; then
            echo "cx-distro already present as subdirectory"
          fi
          git clone --depth=1 https://github.com/Franzferdinan51/cx-distro.git -b duckbotos duckbot-os-repo/cx-distro
          echo "cx-distro cloned: $(ls duckbot-os-repo/cx-distro/packages/ | wc -l) packages"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            squashfs-tools \
            xorriso \
            isolinux \
            syslinux-efi \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            dpkg-dev \
            devscripts \
            debhelper \
            fakeroot \
            gnupg \
            python3-pip \
            wget \
            curl \
            git \
            rsync \
            uuid-runtime \
            cpio \
            gzip \
            xz-utils

      - name: Build DuckBotOS ISO
        env:
          DUCKBOTOS_MODE: ${{ env.DUCKBOTOS_MODE }}
        run: |
          cd duckbot-os-repo/cx-distro
          chmod +x src/build.sh
          chmod +x src/mods/install_all_mods.sh
          chmod +x scripts/*.sh
          chmod +x scripts/install-deps.sh
          sed -i 's/^export DUCKBOTOS_MODE=.*/export DUCKBOTOS_MODE="${{ env.DUCKBOTOS_MODE }}"/' src/args.sh
          sudo ./src/build.sh

      - name: Locate built ISO
        id: locate
        run: |
          ISO_PATH=$(find . -name "*.iso" -type f 2>/dev/null | head -1)
          if [ -z "$ISO_PATH" ]; then
            echo "Error: No ISO found after build"
            find . -name "*.iso" 2>/dev/null || echo "no iso files found"
            exit 1
          fi
          echo "ISO_PATH=$ISO_PATH" >> $GITHUB_OUTPUT
          ISO_SIZE=$(du -h "$ISO_PATH" | cut -f1)
          echo "ISO_SIZE=$ISO_SIZE" >> $GITHUB_OUTPUT
          echo "Found ISO: $ISO_PATH ($ISO_SIZE)"

      - name: Generate SHA256 checksum
        run: |
          cd duckbot-os-repo
          ISO_FILE="${{ steps.locate.outputs.ISO_PATH }}"
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          echo "Checksum generated:"
          cat "${ISO_FILE}.sha256"

      - name: Generate SBOM
        if: runner.os == 'Linux'
        run: |
          cd duckbot-os-repo
          ISO_FILE="${{ steps.locate.outputs.ISO_PATH }}"
          mkdir -p sbom
          if command -v syft &>/dev/null; then
            syft "$ISO_FILE" -o cyclonedx-json=sbom/duckbotos.cyclonedx.json || true
            syft "$ISO_FILE" -o spdx-json=sbom/duckbotos.spdx.json || true
            echo "SBOM generated"
          else
            echo "syft not available, skipping SBOM generation"
          fi

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: duckbotos-${{ env.DUCKBOTOS_MODE }}-iso
          path: |
            duckbot-os-repo/${{ steps.locate.outputs.ISO_PATH }}
            duckbot-os-repo/${{ steps.locate.outputs.ISO_PATH }}.sha256
            duckbot-os-repo/sbom/**
          retention-days: 30
          compression-level: 9

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          ISO_FILE: ${{ steps.locate.outputs.ISO_PATH }}
          ISO_SIZE: ${{ steps.locate.outputs.ISO_SIZE }}
        run: |
          cd duckbot-os-repo
          gh release create "v${{ env.VERSION }}" \
            --title "DuckBotOS v${{ env.VERSION }} (${{ env.DUCKBOTOS_MODE }})" \
            --notes "DuckBotOS ${{ env.DUCKBOTOS_MODE }} mode ISO. Built from cx-distro commit." \
            --latest \
            "$ISO_FILE" \
            "${ISO_FILE}.sha256" || true

      - name: Summary
        run: |
          echo "## DuckBotOS ISO Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ env.DUCKBOTOS_MODE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ISO | \`${{ steps.locate.outputs.ISO_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | ${{ steps.locate.outputs.ISO_SIZE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ISO artifact available for 30 days." >> $GITHUB_STEP_SUMMARY
