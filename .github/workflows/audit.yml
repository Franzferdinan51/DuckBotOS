name: Audit Debian Packages

on:
  push:
    branches: [main, duckbotos]
  pull_request:
    branches: [main, duckbotos]

jobs:
  audit:
    name: Audit packages (${{ github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DuckBotOS
        uses: actions/checkout@v4

      - name: Clone cx-distro build pipeline
        run: |
          git clone --depth=1 https://github.com/Franzferdinan51/cx-distro.git -b duckbotos cx-distro
          echo "cx-distro cloned: $(ls cx-distro/packages/ | wc -l) packages"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download and run audit script
        run: |
          # Download fresh to bypass any pip/source cache
          curl -fsSL \
            "https://raw.githubusercontent.com/Franzferdinan51/DuckBotOS/${{ github.sha }}/scripts/audit-debian-packages.py" \
            -o audit-debian-packages.py \
            || curl -fsSL \
              "https://raw.githubusercontent.com/Franzferdinan51/DuckBotOS/main/scripts/audit-debian-packages.py" \
              -o audit-debian-packages.py
          chmod +x audit-debian-packages.py
          python3 audit-debian-packages.py > audit-summary.txt || true
          cat audit-summary.txt

      - name: Upload audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package-audit-${{ github.ref_name }}
          path: |
            audit-summary.txt
            audit-debian-packages.py
          retention-days: 14

      - name: Fail if audit has errors
        run: |
          if grep -q "NOT BUILD\|❌ NOT BUILD" audit-summary.txt; then
            echo "❌ Package audit failed — see artifact for details"
            exit 1
          fi
          echo "✅ All packages passed audit"
